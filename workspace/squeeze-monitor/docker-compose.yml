version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: squeeze-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: squeeze_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  agent:
    build: .
    container_name: squeeze-agent
    restart: unless-stopped
    env_file: .env
    command: python -m agent.squeeze_agent
    depends_on:
      - db

  api:
    build: .
    container_name: squeeze-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./api:/app/api

  grafana:
    image: grafana/grafana:11.0.0
    container_name: squeeze-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - db

volumes:
  postgres_data:
  grafana_data: